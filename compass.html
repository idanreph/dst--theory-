<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DST Compass v3</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background:#0a0a0a; color:#f5f5f5; font-family:system-ui; }
textarea { background:#111; border:1px solid #333; }
</style>
</head>

<body class="p-6">

<div class="max-w-4xl mx-auto">

<h1 class="text-4xl font-bold text-center mb-2">DST Compass</h1>
<p class="text-center text-gray-400 mb-10">Thinking Engine v3</p>

<!-- QUESTIONS -->
<div id="q15" class="space-y-4"></div>

<button onclick="generateReport()"
class="w-full mt-8 bg-emerald-700 py-4 rounded-xl font-bold">
Generate Analysis
</button>

<!-- OUTPUT -->
<div id="output" class="hidden mt-10 space-y-6">

<div id="errorBox" class="hidden bg-red-900/30 p-6 rounded-xl border border-red-600"></div>

<div id="scoreBox" class="bg-gray-900 p-6 rounded-xl border border-gray-700"></div>

<div id="insightBox" class="bg-yellow-900/20 p-6 rounded-xl border border-yellow-700"></div>

<div id="gapBox" class="bg-red-900/20 p-6 rounded-xl border border-red-700"></div>

<div id="challengeBox" class="bg-purple-900/20 p-6 rounded-xl border border-purple-700"></div>

<pre id="reportText" class="bg-black p-6 rounded-xl text-emerald-300 text-sm"></pre>

<!-- PREMIUM -->
<div class="bg-gray-800 p-6 rounded-xl text-center">
<h3 class="text-xl font-bold mb-2">🔒 Full Analysis</h3>
<button onclick="unlockPremium()" class="bg-purple-700 px-6 py-3 rounded-xl font-bold">
Reveal Full Analysis
</button>

<div id="premiumContent" class="hidden mt-6 text-left space-y-3">
<p id="premiumRisk"></p>
<p id="premiumBlind"></p>
<p id="premiumAction"></p>
</div>
</div>

<button onclick="copyToAI()"
class="w-full bg-indigo-700 py-4 rounded-xl font-bold">
🔬 Deep AI Analysis
</button>

<div>
<p class="text-gray-400 text-sm">SHA-256</p>
<p id="hashDisplay" class="text-emerald-400 font-mono"></p>
</div>

</div>
</div>

<script>

// QUESTIONS (cleaned)
const questions = [
"Q3 Regime",
"Q4 Θ (tolerance)",
"Q8 κ (masking)",
"Q13.5 κ-cap",
"Failure definition",
"Lying metric"
];

const container = document.getElementById("q15");
questions.forEach((q,i)=>{
container.innerHTML += `
<div>
<label>${q}</label>
<textarea id="q${i}" class="w-full p-2 rounded"></textarea>
</div>`;
});

// HASH
async function sha256(str){
const buf = new TextEncoder().encode(str);
const hash = await crypto.subtle.digest("SHA-256",buf);
return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

// MAIN
async function generateReport(){

let values = questions.map((_,i)=>document.getElementById("q"+i).value.trim());
let filled = values.filter(v=>v.length>5);

// ❌ EMPTY CHECK
if(filled.length < 2){
document.getElementById("output").classList.remove("hidden");
document.getElementById("errorBox").classList.remove("hidden");
document.getElementById("errorBox").innerText =
"⚠️ No meaningful input. Answer at least 2 key questions.";
return;
}

// TEXT
let text = values.join(" ").toLowerCase();

// SCORING
let kappa = (text.match(/mask|delay|patch|bailout|human/g)||[]).length;
let thetaWeak = (text.match(/weak|low|limited|exhaust/g)||[]).length;

// SCORE BOX
document.getElementById("scoreBox").innerHTML = `
<b>DST Score</b><br>
Masking (κ): ${kappa}/10<br>
Tolerance (Θ): ${thetaWeak > 2 ? "Weak" : "OK"}<br>
Regime: ${kappa > 5 ? "Residual" : kappa > 2 ? "Plastic" : "Elastic"}
`;

// INSIGHT
document.getElementById("insightBox").innerHTML = `
⚠️ <b>Insight</b><br>
${kappa > 2 
? "System relies on masking. Scaling increases fragility."
: "Low masking signals detected, but data may be incomplete."}
`;

// GAP DETECTION
let gap = "";
if(!text.includes("cap") && !text.includes("reduce")) gap += "Missing κ-cap. ";
if(!text.includes("tolerance")) gap += "Missing Θ clarity. ";

document.getElementById("gapBox").innerHTML =
`⚠️ <b>Gaps</b><br>${gap || "No major gaps detected"}`;

// CHALLENGE
document.getElementById("challengeBox").innerHTML = `
🧠 <b>System Challenge</b><br>
${kappa > 3 
? "You think system works, but masking hides real fragility."
: "Your answers may underestimate hidden risk."}
`;

// REPORT
let report = "DST REPORT\n\n" + values.join("\n");
document.getElementById("reportText").textContent = report;

// HASH
const hash = await sha256(report);
document.getElementById("hashDisplay").textContent = hash;

// SHOW
document.getElementById("output").classList.remove("hidden");

window.currentReport = report;
}

// PREMIUM
function unlockPremium(){
document.getElementById("premiumContent").classList.remove("hidden");

let t = (window.currentReport || "").toLowerCase();

document.getElementById("premiumRisk").innerText =
t.includes("mask") ? "🔥 Hidden Risk: masking dependence growing." : "Risk unclear.";

document.getElementById("premiumBlind").innerText =
"🧠 Blind Spot: system lacks κ-cap clarity.";

document.getElementById("premiumAction").innerText =
"⚡ Action: reduce one masking channel immediately.";
}

// AI
function copyToAI(){
const text = window.currentReport || "";

const prompt = `
You are a DST expert.

Find:
- hidden risks
- blind spots
- what breaks first
- κ-cap
- top actions

${text}
`;

navigator.clipboard.writeText(prompt);
alert("Copied → paste into AI");
}

</script>
</body>
</html>
