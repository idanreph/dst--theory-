<script>

// --------------------------

const questions15 = [
  "Q1. System boundary",
  "Q2. Failure definition",
  "Q3. Regime",
  "Q4. Θ (tolerance)",
  "Q5. D (damage)",
  "Q6. σ (stress engine)",
  "Q7. ρ (restoration)",
  "Q8. κ (displacement)",
  "Q9. κmax",
  "Q10. Lying metric",
  "Q11. Θ proxy",
  "Q12. κ proxy",
  "Q13. Transition boundary",
  "Q13.5 κ-cap",
  "Q14. Correct rail",
  "Q15. Who pays"
];

const questions1b = [
  "Q1. Pain spend",
  "Q2. Failure cost",
  "Q3. First buyer",
  "Q4. Ultimate payer",
  "Q5. Hidden variable",
  "Q6. Better signal",
  "Q7. Commercial wedge",

  "Q10. Defensibility",
  "Q11. 2% path",
  "Q12. Scale thesis"
];

// --------------------------
// HASH FUNCTION (REQUIRED)
// --------------------------

async function sha256(str) {
  const encoder = new TextEncoder();
  const data = encoder.encode(str);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hashBuffer))
    .map(b => b.toString(16).padStart(2, '0'))
    .join('');
}

// --------------------------
// MAIN ENGINE (FIXED)
// --------------------------

async function generateReport() {

  let answers15 = [];
  let answers1b = [];

  // SAFE INPUT READ (no crash if empty)
  questions15.forEach((q, i) => {
    const el = document.getElementById(`q15_${i}`);
    answers15.push(el ? el.value.toLowerCase() : "");
  });

  questions1b.forEach((q, i) => {
    const el = document.getElementById(`q1b_${i}`);
    answers1b.push(el ? el.value.toLowerCase() : "");
  });

  // --------------------------
  // DST ANALYSIS
  // --------------------------

  let kappaScore = 0;
  let thetaWeak = 0;

  answers15.forEach(a => {
    if (a.includes("delay") || a.includes("mask") || a.includes("bailout") || a.includes("stimulus")) {
      kappaScore++;
    }
    if (a.includes("low") || a.includes("weak") || a.includes("limited")) {
      thetaWeak++;
    }
  });

  // Regime
  let regime = "Elastic";
  if (kappaScore > 3) regime = "Plastic";
  if (kappaScore > 6 && thetaWeak > 3) regime = "Residual";

  // Risk
  let risk = "LOW";
  if (kappaScore > 3) risk = "MEDIUM";
  if (kappaScore > 6) risk = "HIGH";

  // Rail
  let rail = "Buffer Rail";
  if (kappaScore > 5) rail = "Reset Rail (κ must be capped first)";
  if (answers15.join(" ").includes("hidden") || answers15.join(" ").includes("unknown")) {
    rail = "Truth Rail";
  }

  // --------------------------
  // CANONICAL OUTPUT
  // --------------------------

  let canonical = `
DST DIAGNOSIS

System Regime: ${regime}
Risk Level: ${risk}

Key Insight:
This system shows ${kappaScore > 3 ? "significant dependence on masking (κ)" : "low masking behavior"} 
and ${thetaWeak > 2 ? "declining true tolerance (Θ)" : "stable tolerance"}.

Interpretation:
The system is likely ${regime.toLowerCase()} because stress is being ${
    kappaScore > 3 ? "displaced rather than resolved" : "handled through restoration"
  }.

Recommended Action:
Primary intervention: ${rail}

Warning:
${kappaScore > 5 ? "κ saturation risk is high — sudden transition possible." : "No immediate collapse signal detected."}
`;

  // --------------------------
  // FULL REPORT
  // --------------------------

  let report = "DST COMPASS REPORT — " + new Date().toISOString() + "\n\n";
  report += "=== CANONICAL ANALYSIS ===\n" + canonical + "\n\n";

  report += "=== RAW INPUT (15Q) ===\n";
  questions15.forEach((q, i) => {
    report += q + "\nAnswer: " + (answers15[i] || "—") + "\n\n";
  });

  report += "=== RAW INPUT (1B) ===\n";
  questions1b.forEach((q, i) => {
    report += q + "\nAnswer: " + (answers1b[i] || "—") + "\n\n";
  });

  const hash = await sha256(report);

  document.getElementById('reportText').textContent = report;
  document.getElementById('hashDisplay').textContent = hash;
  document.getElementById('output').classList.remove('hidden');

  window.currentReport = report;
  window.currentHash = hash;
}

</script>
